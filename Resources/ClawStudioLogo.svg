<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3873FF"/>
      <stop offset="50%" style="stop-color:#6B4BF5"/>
      <stop offset="100%" style="stop-color:#8552FA"/>
    </linearGradient>
    <!-- Claw highlight gradient -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0E8FF;stop-opacity:0.9"/>
    </linearGradient>
    <!-- Inner glow for claw -->
    <linearGradient id="clawInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8D8FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#3873FF;stop-opacity:0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1a1a4e" flood-opacity="0.3"/>
    </filter>
    <!-- Inner shadow for depth -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.15"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bgGrad)"/>

  <!-- Subtle light overlay at top -->
  <rect x="32" y="32" width="960" height="480" rx="215" ry="215" fill="url(#glow)" opacity="0.5"/>

  <!-- Top glossy shine -->
  <ellipse cx="512" cy="220" rx="340" ry="160" fill="white" opacity="0.06"/>

  <!-- === LOBSTER CLAW === -->
  <g transform="translate(512, 480)" filter="url(#shadow)">

    <!-- Left pincer -->
    <path d="
      M -60,-180
      C -80,-260 -160,-310 -210,-290
      C -270,-265 -280,-190 -240,-140
      C -210,-100 -160,-90 -120,-100
      L -60,-120
      Z
    " fill="url(#clawGrad)" opacity="0.95"/>

    <!-- Left pincer inner detail -->
    <path d="
      M -70,-170
      C -85,-230 -140,-265 -180,-252
      C -220,-238 -228,-190 -205,-155
      C -185,-125 -150,-118 -125,-125
      L -70,-140
      Z
    " fill="url(#clawInner)"/>

    <!-- Right pincer -->
    <path d="
      M 60,-180
      C 80,-260 160,-310 210,-290
      C 270,-265 280,-190 240,-140
      C 210,-100 160,-90 120,-100
      L 60,-120
      Z
    " fill="url(#clawGrad)" opacity="0.95"/>

    <!-- Right pincer inner detail -->
    <path d="
      M 70,-170
      C 85,-230 140,-265 180,-252
      C 220,-238 228,-190 205,-155
      C 185,-125 150,-118 125,-125
      L 70,-140
      Z
    " fill="url(#clawInner)"/>

    <!-- Claw base / palm -->
    <path d="
      M -100,-110
      C -110,-50 -90,30 -60,80
      C -30,130 0,150 0,150
      C 0,150 30,130 60,80
      C 90,30 110,-50 100,-110
      L 60,-120
      L -60,-120
      Z
    " fill="url(#clawGrad)" opacity="0.95"/>

    <!-- Claw base inner shading -->
    <path d="
      M -75,-90
      C -80,-40 -65,20 -40,60
      C -20,90 0,105 0,105
      C 0,105 20,90 40,60
      C 65,20 80,-40 75,-90
      L 50,-100
      L -50,-100
      Z
    " fill="url(#clawInner)"/>

    <!-- Center line detail on claw -->
    <line x1="0" y1="-110" x2="0" y2="120" stroke="white" stroke-width="2" opacity="0.15"/>

    <!-- Left pincer tip accent -->
    <circle cx="-225" cy="-260" r="8" fill="white" opacity="0.5"/>

    <!-- Right pincer tip accent -->
    <circle cx="225" cy="-260" r="8" fill="white" opacity="0.5"/>

  </g>

  <!-- === STUDIO SPARKLES (3 diamond shapes) === -->
  <!-- Top left sparkle -->
  <g transform="translate(280, 260)">
    <path d="M 0,-14 L 5,0 L 0,14 L -5,0 Z" fill="white" opacity="0.8"/>
    <path d="M -10,0 L 0,-4 L 10,0 L 0,4 Z" fill="white" opacity="0.6"/>
  </g>

  <!-- Top right sparkle -->
  <g transform="translate(740, 290)">
    <path d="M 0,-10 L 4,0 L 0,10 L -4,0 Z" fill="white" opacity="0.7"/>
    <path d="M -8,0 L 0,-3 L 8,0 L 0,3 Z" fill="white" opacity="0.5"/>
  </g>

  <!-- Small sparkle -->
  <g transform="translate(690, 220)">
    <path d="M 0,-6 L 2,0 L 0,6 L -2,0 Z" fill="white" opacity="0.5"/>
  </g>

  <!-- === CLAW STUDIO TEXT === -->
  <text x="512" y="810" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial" font-size="86" font-weight="700" letter-spacing="12" fill="white" opacity="0.95">
    CLAW
  </text>
  <text x="512" y="880" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial" font-size="42" font-weight="500" letter-spacing="18" fill="white" opacity="0.6">
    STUDIO
  </text>

  <!-- Bottom subtle line accent -->
  <line x1="380" y1="910" x2="644" y2="910" stroke="white" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>
